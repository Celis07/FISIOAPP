<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FisioApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
      body { background: #0f1117; color: #e2e8f0; margin: 0; }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: #1a1d27; }
      ::-webkit-scrollbar-thumb { background: #2d3348; border-radius: 4px; }
      input, textarea, select { color: #e2e8f0 !important; }
      input::placeholder, textarea::placeholder { color: #4a5270 !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
